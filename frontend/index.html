<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mind Pop</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bangers&family=Chewy&family=Fredoka+One&family=Luckiest+Guy&family=Pacifico&family=Righteous&family=Shrikhand&family=Titan+One&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <style>
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow-lg {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow-sm {
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        .animate-float-delayed {
            animation: float 8s ease-in-out infinite;
            animation-delay: 2s;
        }
    </style>
    
    <!-- Global CSS (now handled by Vite) -->
    <link rel="stylesheet" href="/src/styles/global.css" />
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen font-sans text-brand-dark overflow-x-hidden">
    <div id="root"></div>

    <!-- Main Entry Point for Vite -->
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
